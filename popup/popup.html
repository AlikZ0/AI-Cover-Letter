<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Cover Letter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header__logo">
        <svg class="header__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <h1 class="header__title">AI Cover Letter</h1>
      </div>
      <button id="settingsBtn" class="btn-icon" title="Настройки">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Status bar -->
    <div id="statusBar" class="status-bar hidden">
      <span id="statusText"></span>
    </div>

    <!-- No API key warning -->
    <div id="noApiKeyWarning" class="warning hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span>API-ключ не настроен. <a href="#" id="openSettingsLink">Настроить</a></span>
    </div>

    <!-- Job data section -->
    <section id="jobSection" class="section">
      <div class="section__header">
        <h2 class="section__title">Вакансия</h2>
        <button id="refreshBtn" class="btn-icon btn-icon--small" title="Обновить данные">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>

      <div id="jobDataEmpty" class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="32" height="32">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p>Откройте страницу вакансии и нажмите «Обновить»</p>
      </div>

      <div id="jobDataContent" class="job-card hidden">
        <div class="job-card__field">
          <span class="job-card__label">Должность</span>
          <span id="jobTitle" class="job-card__value"></span>
        </div>
        <div class="job-card__field">
          <span class="job-card__label">Компания</span>
          <span id="jobCompany" class="job-card__value"></span>
        </div>
        <div class="job-card__field">
          <span class="job-card__label">Локация</span>
          <span id="jobLocation" class="job-card__value"></span>
        </div>
        <div class="job-card__field">
          <span class="job-card__label">Язык</span>
          <span id="jobLanguage" class="job-card__value"></span>
        </div>
        <div class="job-card__field" id="salaryField">
          <span class="job-card__label">Зарплата</span>
          <span id="jobSalary" class="job-card__value"></span>
        </div>
        <details class="job-card__details">
          <summary>Описание вакансии</summary>
          <p id="jobDescription" class="job-card__description"></p>
        </details>
      </div>
    </section>

    <!-- Tone selector -->
    <section id="toneSection" class="section hidden">
      <h2 class="section__title">Тон письма</h2>
      <div class="tone-selector">
        <label class="tone-option">
          <input type="radio" name="tone" value="professional" checked>
          <span class="tone-option__label">Профессиональный</span>
        </label>
        <label class="tone-option">
          <input type="radio" name="tone" value="friendly">
          <span class="tone-option__label">Дружелюбный</span>
        </label>
        <label class="tone-option">
          <input type="radio" name="tone" value="confident">
          <span class="tone-option__label">Уверенный</span>
        </label>
        <label class="tone-option">
          <input type="radio" name="tone" value="formal">
          <span class="tone-option__label">Официальный</span>
        </label>
      </div>
    </section>

    <!-- Generate button -->
    <div id="generateSection" class="section hidden">
      <button id="generateBtn" class="btn btn--primary btn--full">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        <span>Сгенерировать письмо</span>
      </button>
    </div>

    <!-- Loading -->
    <div id="loadingSection" class="section hidden">
      <div class="loading">
        <div class="loading__spinner"></div>
        <span class="loading__text">Генерация письма...</span>
      </div>
    </div>

    <!-- Result -->
    <section id="resultSection" class="section hidden">
      <div class="section__header">
        <h2 class="section__title">Сопроводительное письмо</h2>
        <div class="section__actions">
          <button id="copyBtn" class="btn btn--small" title="Копировать">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <span>Копировать</span>
          </button>
          <button id="regenerateBtn" class="btn btn--small btn--outline" title="Перегенерировать">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            <span>Заново</span>
          </button>
        </div>
      </div>
      <textarea id="resultText" class="result-textarea" rows="12"></textarea>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <span>Powered by Gemini / OpenAI / DeepSeek</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
